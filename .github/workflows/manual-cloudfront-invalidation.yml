name: Manual CloudFront Invalidation

on:
  workflow_dispatch:
    inputs:
      distribution_id:
        description: 'CloudFront Distribution ID'
        required: true
        default: 'E1I1G8B7AJRAFQ'
      paths:
        description: 'Paths to invalidate (default: /*)'
        required: false
        default: '/*'

env:
  AWS_REGION: us-east-1

jobs:
  invalidate:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    steps:
    - name: 🔐 Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: ⚡ Invalidate CloudFront cache
      run: |
        echo "🔄 Invalidating CloudFront cache..."
        echo "Distribution ID: ${{ github.event.inputs.distribution_id }}"
        echo "Paths: ${{ github.event.inputs.paths }}"
        
        INVALIDATION_ID=$(aws cloudfront create-invalidation \
          --distribution-id ${{ github.event.inputs.distribution_id }} \
          --paths "${{ github.event.inputs.paths }}" \
          --query 'Invalidation.Id' \
          --output text)
        
        echo "⏳ Invalidation ID: $INVALIDATION_ID"
        echo "⚡ CloudFront cache will be cleared in ~5-10 minutes"
        
        # Get distribution domain
        DOMAIN=$(aws cloudfront get-distribution \
          --id ${{ github.event.inputs.distribution_id }} \
          --query 'Distribution.DomainName' \
          --output text)
        
        echo "🌐 CloudFront URL: https://$DOMAIN"
        echo "✅ Manual invalidation completed successfully!"