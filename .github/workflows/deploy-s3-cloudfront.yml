name: Frontend Deployment to AWS S3 + CloudFront

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '20'
  PROJECT_NAME: dashboard-front

jobs:
  infrastructure:
    runs-on: ubuntu-latest
    outputs:
      s3-bucket: ${{ steps.setup-infra.outputs.s3-bucket }}
      cloudfront-id: ${{ steps.setup-infra.outputs.cloudfront-id }}
      cloudfront-domain: ${{ steps.setup-infra.outputs.cloudfront-domain }}
    
    permissions:
      contents: read
      id-token: write

    steps:
    - name: 🔄 Checkout code
      uses: actions/checkout@v4

    - name: 🔐 Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: 🏗️ Setup Infrastructure (Create if not exists)
      id: setup-infra
      run: |
        # =========================
        # S3 Bucket Resolution
        # Prioridades:
        # 1. Secret S3_BUCKET (recomendado: dashboard-front-static-prod)
        # 2. Variável já exportada no ambiente
        # 3. Nome determinístico baseado no projeto (dashboard-front-static-prod)
        # =========================
        if [ -n "${{ secrets.S3_BUCKET }}" ]; then
          S3_BUCKET="${{ secrets.S3_BUCKET }}"
        elif [ -n "$S3_BUCKET" ]; then
          S3_BUCKET="$S3_BUCKET"
        else
          # Nome determinístico (sem timestamp) para evitar recriação
          # IMPORTANTE: Deve corresponder ao bucket existente na AWS
          S3_BUCKET="${PROJECT_NAME}-static-prod"
        fi

        echo "📦 Bucket alvo: $S3_BUCKET"

        # Verifica existência do bucket (head-bucket retorna 0 se existe)
        if aws s3api head-bucket --bucket "$S3_BUCKET" 2>/dev/null; then
          echo "✅ Reutilizando bucket existente: $S3_BUCKET"
        else
          echo "🆕 Bucket não existe. Criando: $S3_BUCKET"
          aws s3 mb s3://$S3_BUCKET --region ${{ env.AWS_REGION }}

          # Configura hosting estático (idempotente)
            aws s3 website s3://$S3_BUCKET --index-document index.html --error-document index.html

          echo "⚠️  Verifique as permissões públicas e política do bucket caso ainda não configurado."
        fi

        # Check if CloudFront distribution exists
        if [ -n "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" ]; then
          CLOUDFRONT_ID="${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
          echo "⚡ Using existing CloudFront distribution: $CLOUDFRONT_ID"
          CLOUDFRONT_DOMAIN=$(aws cloudfront get-distribution \
            --id $CLOUDFRONT_ID \
            --query 'Distribution.DomainName' \
            --output text)
        else
          echo "⚡ Please create CloudFront distribution manually or add CLOUDFRONT_DISTRIBUTION_ID to secrets"
          CLOUDFRONT_ID="MANUAL_SETUP_REQUIRED"
          CLOUDFRONT_DOMAIN="MANUAL_SETUP_REQUIRED"
        fi

        # Outputs
        echo "s3-bucket=$S3_BUCKET" >> $GITHUB_OUTPUT
        echo "cloudfront-id=$CLOUDFRONT_ID" >> $GITHUB_OUTPUT
        echo "cloudfront-domain=$CLOUDFRONT_DOMAIN" >> $GITHUB_OUTPUT

        echo "🏗️ Infrastructure Status:"
        echo "📦 S3 Bucket: $S3_BUCKET"
        echo "⚡ CloudFront ID: $CLOUDFRONT_ID"
        echo "🌐 Domain: $CLOUDFRONT_DOMAIN"

  deploy:
    needs: infrastructure
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    steps:
    - name: 🔄 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: 📦 Install dependencies
      run: |
        echo "📥 Installing dependencies..."
        npm ci --prefer-offline --no-audit
        echo "✅ Dependencies installed successfully"

    - name: 🧪 Run tests
      run: npm run test:unit

    - name: 🔧 Verify environment configuration
      run: |
        echo "📋 Verifying environment configuration..."
        
        if [ -f .env.production ]; then
          echo "✅ .env.production found"
          cat .env.production
        else
          echo "❌ .env.production not found!"
          exit 1
        fi
        
        echo ""
        echo "🔍 Environment will be automatically loaded by Vite during build"

    - name: 🏗️ Build application
      shell: bash
      run: |
        echo "🔨 Building application with production environment..."
        echo "Loading environment variables from .env.production..."
        
        # Load environment variables from .env.production if script exists
        if [ -f "./scripts/load-env.sh" ]; then
          echo "📋 Using load-env.sh script..."
          source ./scripts/load-env.sh production
        else
          echo "📋 Loading .env.production directly..."
          if [ -f ".env.production" ]; then
            export $(cat .env.production | grep -v '^#' | xargs)
          fi
        fi
        
        echo "🔨 Building with npm run build..."
        npm run build

    - name: 📊 Display build stats
      run: |
        echo "📦 Build completed successfully!"
        echo ""
        echo " Build size:"
        du -sh dist/
        echo ""
        echo "📄 Generated files:"
        find dist/ -type f -name "*.js" -o -name "*.css" -o -name "*.html" | head -10
        echo ""
        echo "🔍 Build artifacts summary:"
        echo "JavaScript files: $(find dist/ -name "*.js" | wc -l)"
        echo "CSS files: $(find dist/ -name "*.css" | wc -l)"
        echo "Asset files: $(find dist/assets/ -type f | wc -l)"

    - name: 🔍 Verify configuration in build
      run: |
        echo "🔍 Verifying build configuration..."
        
        # Verify index.html exists and has content
        if [ -f "dist/index.html" ]; then
          echo "✅ index.html generated successfully"
          echo "📄 index.html size: $(du -h dist/index.html | cut -f1)"
        else
          echo "❌ index.html not found!"
          exit 1
        fi
        
        # Check for main JS files (these contain our config)
        JS_FILES=$(find dist/assets/ -name "index-*.js" | head -1)
        if [ -n "$JS_FILES" ]; then
          echo "✅ Main JavaScript bundle found: $(basename $JS_FILES)"
          
          # Verify environment configuration is embedded
          if grep -q "c10rgiry67.execute-api.us-east-1.amazonaws.com" "$JS_FILES"; then
            echo "✅ API URL correctly embedded in build"
          else
            echo "⚠️  API URL not found in main bundle"
          fi
        else
          echo "⚠️  Main JavaScript bundle not found"
        fi

    - name: 🔐 Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: 🗑️ Clean old files from S3
      run: |
        echo "🧹 Cleaning old files from S3..."
        BUCKET_NAME="${{ needs.infrastructure.outputs.s3-bucket }}"
        
        if [ -z "$BUCKET_NAME" ]; then
          echo "❌ Error: Bucket name is empty!"
          echo "Available outputs:"
          echo "S3 Bucket: '${{ needs.infrastructure.outputs.s3-bucket }}'"
          echo "CloudFront ID: '${{ needs.infrastructure.outputs.cloudfront-id }}'"
          echo "CloudFront Domain: '${{ needs.infrastructure.outputs.cloudfront-domain }}'"
          exit 1
        fi
        
        echo "📦 Using bucket: $BUCKET_NAME"
        aws s3 rm s3://$BUCKET_NAME/ --recursive --exclude "index.html"

    - name: ⬆️ Sync static assets to S3 (with long cache)
      run: |
        echo "📤 Uploading static assets with 1-year cache..."
        BUCKET_NAME="${{ needs.infrastructure.outputs.s3-bucket }}"
        echo "📦 Using bucket: $BUCKET_NAME"
        aws s3 sync dist/assets/ s3://$BUCKET_NAME/assets/ \
          --cache-control "public,max-age=31536000,immutable" \
          --metadata-directive REPLACE

    - name: ⬆️ Upload other files to S3 (with short cache)
      run: |
        echo "📤 Uploading other files..."
        BUCKET_NAME="${{ needs.infrastructure.outputs.s3-bucket }}"
        echo "📦 Using bucket: $BUCKET_NAME"
        aws s3 sync dist/ s3://$BUCKET_NAME/ \
          --exclude "assets/*" \
          --exclude "index.html" \
          --cache-control "public,max-age=3600" \
          --metadata-directive REPLACE

    - name: ⬆️ Upload index.html (no cache)
      run: |
        echo "📤 Uploading index.html with no cache..."
        BUCKET_NAME="${{ needs.infrastructure.outputs.s3-bucket }}"
        echo "📦 Using bucket: $BUCKET_NAME"
        aws s3 cp dist/index.html s3://$BUCKET_NAME/index.html \
          --cache-control "public,max-age=0,must-revalidate" \
          --metadata-directive REPLACE

    - name: ⚡ Invalidate CloudFront cache
      run: |
        CLOUDFRONT_ID="${{ needs.infrastructure.outputs.cloudfront-id }}"
        
        if [ "$CLOUDFRONT_ID" != "MANUAL_SETUP_REQUIRED" ] && [ -n "$CLOUDFRONT_ID" ]; then
          echo "🔄 Invalidating CloudFront cache..."
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_ID \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "⏳ Invalidation ID: $INVALIDATION_ID"
          echo "⚡ CloudFront cache will be cleared in ~5-10 minutes"
        else
          echo "⚠️  CloudFront invalidation skipped:"
          echo "   CloudFront distribution not configured or manual setup required"
          echo "   Add CLOUDFRONT_DISTRIBUTION_ID=E1I1G8B7AJRAFQ to GitHub secrets"
          echo "   Your actual CloudFront ID: E1I1G8B7AJRAFQ"
        fi

    - name: ✅ Verify deployment
      run: |
        echo "🔍 Verifying deployment..."
        
        CLOUDFRONT_ID="${{ needs.infrastructure.outputs.cloudfront-id }}"
        CLOUDFRONT_DOMAIN="${{ needs.infrastructure.outputs.cloudfront-domain }}"
        
        echo "📊 Deployment Summary:"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "🪣 S3 Bucket: ${{ needs.infrastructure.outputs.s3-bucket }}"
        echo "⚡ CloudFront: $CLOUDFRONT_ID"
        echo "🌐 S3 Website: http://${{ needs.infrastructure.outputs.s3-bucket }}.s3-website-us-east-1.amazonaws.com"
        echo "📦 Build size: $(du -sh dist/ | cut -f1)"
        echo "⏰ Deploy time: $(date)"
        echo ""
        echo "🔧 Environment Configuration:"
        echo "🔗 API URL: $VITE_API_URL"
        echo "🏷️  App Title: $VITE_APP_TITLE"
        echo "📋 App Version: $VITE_APP_VERSION"
        echo "🌍 Environment: $VITE_ENVIRONMENT"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        echo "✅ Frontend deployed successfully!"
        
        if [ "$CLOUDFRONT_ID" != "MANUAL_SETUP_REQUIRED" ] && [ -n "$CLOUDFRONT_ID" ]; then
          echo "🌐 CloudFront URL: https://$CLOUDFRONT_DOMAIN"
          echo "⚡ CloudFront propagation: 5-15 minutes"
        else
          echo "🌐 S3 Direct Access: http://${{ needs.infrastructure.outputs.s3-bucket }}.s3-website-us-east-1.amazonaws.com"
          echo ""
          echo "💡 To enable CloudFront (HTTPS + CDN):"
          echo "   Add this secret to GitHub: CLOUDFRONT_DISTRIBUTION_ID=E1I1G8B7AJRAFQ"
          echo "   CloudFront URL: https://d358h03symr9q7.cloudfront.net"
        fi
        echo ""
        echo "🚀 Deployment completed successfully!"