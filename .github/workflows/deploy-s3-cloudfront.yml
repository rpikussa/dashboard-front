name: Deploy Frontend to AWS S3 + CloudFront

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '20'
  PROJECT_NAME: dashboard-front

jobs:
  infrastructure:
    runs-on: ubuntu-latest
    outputs:
      s3-bucket: ${{ steps.setup-infra.outputs.s3-bucket }}
      cloudfront-id: ${{ steps.setup-infra.outputs.cloudfront-id }}
      cloudfront-domain: ${{ steps.setup-infra.outputs.cloudfront-domain }}
    
    permissions:
      contents: read
      id-token: write

    steps:
    - name: 🔄 Checkout code
      uses: actions/checkout@v4

    - name: 🔐 Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: 🏗️ Setup Infrastructure (Create if not exists)
      id: setup-infra
      run: |
        # Check if S3 bucket exists (from secrets or create new)
        if [ -n "${{ secrets.S3_BUCKET }}" ]; then
          S3_BUCKET="${{ secrets.S3_BUCKET }}"
          echo "📦 Using existing S3 bucket: $S3_BUCKET"
        else
          S3_BUCKET="${PROJECT_NAME}-static-$(date +%s)"
          echo "📦 Creating new S3 bucket: $S3_BUCKET"
          
          # Create S3 bucket
          aws s3 mb s3://$S3_BUCKET --region ${{ env.AWS_REGION }}
          
          # Configure static website hosting
          aws s3 website s3://$S3_BUCKET --index-document index.html --error-document index.html
          
          echo "⚠️  MANUAL STEP REQUIRED:"
          echo "   1. Go to AWS S3 Console"
          echo "   2. Select bucket: $S3_BUCKET"
          echo "   3. Go to Permissions > Block public access"
          echo "   4. Uncheck all 4 options and save"
          echo "   5. Go to Bucket policy and add public read policy"
          echo "   6. Add S3_BUCKET=$S3_BUCKET to GitHub secrets"
        fi

        # Check if CloudFront distribution exists
        if [ -n "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" ]; then
          CLOUDFRONT_ID="${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
          echo "⚡ Using existing CloudFront distribution: $CLOUDFRONT_ID"
          
          # Get CloudFront domain
          CLOUDFRONT_DOMAIN=$(aws cloudfront get-distribution \
            --id $CLOUDFRONT_ID \
            --query 'Distribution.DomainName' \
            --output text)
        else
          echo "⚡ Please create CloudFront distribution manually or add CLOUDFRONT_DISTRIBUTION_ID to secrets"
          CLOUDFRONT_ID="MANUAL_SETUP_REQUIRED"
          CLOUDFRONT_DOMAIN="MANUAL_SETUP_REQUIRED"
        fi

        # Output for next job
        echo "s3-bucket=$S3_BUCKET" >> $GITHUB_OUTPUT
        echo "cloudfront-id=$CLOUDFRONT_ID" >> $GITHUB_OUTPUT
        echo "cloudfront-domain=$CLOUDFRONT_DOMAIN" >> $GITHUB_OUTPUT
        
        # Summary
        echo "🏗️ Infrastructure Status:"
        echo "📦 S3 Bucket: $S3_BUCKET"
        echo "⚡ CloudFront ID: $CLOUDFRONT_ID"
        echo "🌐 Domain: $CLOUDFRONT_DOMAIN"

  deploy:
    needs: infrastructure
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    steps:
    - name: 🔄 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: 📦 Install dependencies
      run: npm ci

    - name: 🧪 Run tests
      run: npm run test:unit

    - name: 🏗️ Build application
      run: npm run build
      env:
        VITE_API_URL: ${{ vars.VITE_API_URL || 'https://api.seudominio.com' }}

    - name: 📊 Display build stats
      run: |
        echo "📦 Build completed successfully!"
        echo "📁 Build size:"
        du -sh dist/
        echo "📄 Generated files:"
        find dist/ -type f -name "*.js" -o -name "*.css" -o -name "*.html" | head -10

    - name: 🔐 Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: 🗑️ Clean old files from S3
      run: |
        echo "🧹 Cleaning old files from S3..."
        aws s3 rm s3://${{ needs.infrastructure.outputs.s3-bucket }}/ --recursive --exclude "index.html"

    - name: ⬆️ Sync static assets to S3 (with long cache)
      run: |
        echo "📤 Uploading static assets with 1-year cache..."
        aws s3 sync dist/assets/ s3://${{ needs.infrastructure.outputs.s3-bucket }}/assets/ \
          --cache-control "public,max-age=31536000,immutable" \
          --metadata-directive REPLACE

    - name: ⬆️ Upload other files to S3 (with short cache)
      run: |
        echo "📤 Uploading other files..."
        aws s3 sync dist/ s3://${{ needs.infrastructure.outputs.s3-bucket }}/ \
          --exclude "assets/*" \
          --exclude "index.html" \
          --cache-control "public,max-age=3600" \
          --metadata-directive REPLACE

    - name: ⬆️ Upload index.html (no cache)
      run: |
        echo "📤 Uploading index.html with no cache..."
        aws s3 cp dist/index.html s3://${{ needs.infrastructure.outputs.s3-bucket }}/index.html \
          --cache-control "public,max-age=0,must-revalidate" \
          --metadata-directive REPLACE

    - name: ⚡ Invalidate CloudFront cache
      run: |
        CLOUDFRONT_ID="${{ needs.infrastructure.outputs.cloudfront-id }}"
        
        if [ "$CLOUDFRONT_ID" != "MANUAL_SETUP_REQUIRED" ] && [ -n "$CLOUDFRONT_ID" ]; then
          echo "🔄 Invalidating CloudFront cache..."
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_ID \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "⏳ Invalidation ID: $INVALIDATION_ID"
          echo "⚡ CloudFront cache will be cleared in ~5-10 minutes"
        else
          echo "⚠️  CloudFront invalidation skipped:"
          echo "   CloudFront distribution not configured or manual setup required"
          echo "   Add CLOUDFRONT_DISTRIBUTION_ID=E1I1G8B7AJRAFQ to GitHub secrets"
          echo "   Your actual CloudFront ID: E1I1G8B7AJRAFQ"
        fi

    - name: ✅ Verify deployment
      run: |
        echo "🔍 Verifying deployment..."
        
        CLOUDFRONT_ID="${{ needs.infrastructure.outputs.cloudfront-id }}"
        CLOUDFRONT_DOMAIN="${{ needs.infrastructure.outputs.cloudfront-domain }}"
        
        echo "📊 Deployment Summary:"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "🪣 S3 Bucket: ${{ needs.infrastructure.outputs.s3-bucket }}"
        echo "⚡ CloudFront: $CLOUDFRONT_ID"
        echo "🌐 S3 Website: http://${{ needs.infrastructure.outputs.s3-bucket }}.s3-website-us-east-1.amazonaws.com"
        echo "📦 Build size: $(du -sh dist/ | cut -f1)"
        echo "⏰ Deploy time: $(date)"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        echo "✅ Frontend deployed successfully!"
        
        if [ "$CLOUDFRONT_ID" != "MANUAL_SETUP_REQUIRED" ] && [ -n "$CLOUDFRONT_ID" ]; then
          echo "🌐 CloudFront URL: https://$CLOUDFRONT_DOMAIN"
          echo "⚡ CloudFront propagation: 5-15 minutes"
        else
          echo "🌐 S3 Direct Access: http://${{ needs.infrastructure.outputs.s3-bucket }}.s3-website-us-east-1.amazonaws.com"
          echo ""
          echo "💡 To enable CloudFront (HTTPS + CDN):"
          echo "   Add this secret to GitHub: CLOUDFRONT_DISTRIBUTION_ID=E1I1G8B7AJRAFQ"
          echo "   CloudFront URL: https://d358h03symr9q7.cloudfront.net"
        fi
        echo ""
        # Note: GitHub Actions will suggest adding secrets for better performance